<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트폴리오</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>

<nav>
  <div class="inner">
    <span class="nav-name" id="nav-name"></span>
    <ul class="nav-links">
      <li><a href="#projects">프로젝트</a></li>
      <li><a href="#skills">스킬</a></li>
    </ul>
  </div>
</nav>

<main>
  <div class="hero" id="hero"></div>

  <div class="container">
    <div class="main-layout">

      <!-- Main content -->
      <div class="main-content">
        <div class="section-block" id="projects">
          <p class="section-label">Projects</p>
          <div id="projects-list"></div>
        </div>
      </div>

      <!-- Sidebar -->
      <aside class="sidebar" id="skills">
        <div id="toc-sidebar"></div>
        <div id="skills-sidebar"></div>
        <div id="experience-sidebar"></div>
      </aside>

    </div>
  </div>
</main>

<footer>
  <p id="footer-text"></p>
</footer>

<script>
async function loadDiagramSources(data) {
  const tasks = [];
  const collect = (arr) => (arr || []).forEach(d => {
    if (d.src && d.content == null) {
      tasks.push(fetch(d.src).then(r => r.text()).then(t => { d.content = t.trim(); }));
    }
  });
  (data.projects || []).forEach(p => {
    (p.steps || []).forEach(s => collect(s.mermaid));
    (p.findings || []).forEach(f => collect(f.mermaid));
  });
  await Promise.all(tasks);
  return data;
}

if (window.mermaid) {
  mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
}

fetch('data.json')
  .then(r => r.json())
  .then(loadDiagramSources)
  .then(render)
  .then(() => { if (window.mermaid) mermaid.run({ querySelector: '.mermaid' }); });

function hl(text, codes) {
  if (!codes || !codes.length) return text;
  let out = text;
  codes.forEach(c => {
    const esc = c.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp(`(?<!\\w)${esc}(?!\\w)`, 'g'), `<code>${c}</code>`);
  });
  return out;
}

function renderMermaid(blocks) {
  if (!blocks || !blocks.length) return '';
  return blocks.map(b => `
    <figure class="mermaid-figure">
      <div class="mermaid">${b.content}</div>
      ${b.caption ? `<figcaption>${b.caption}</figcaption>` : ''}
    </figure>
  `).join('');
}

function renderImages(images) {
  if (!images || !images.length) return '';
  return `
    <div class="figures">
      ${images.map(img => `
        <figure class="figure">
          <a href="${img.src}" target="_blank" rel="noopener">
            <img src="${img.src}" alt="${img.caption || ''}" loading="lazy" />
          </a>
          ${img.caption ? `<figcaption>${img.caption}</figcaption>` : ''}
        </figure>
      `).join('')}
    </div>
  `;
}

function renderResults(results) {
  if (!results || !results.length) return '';
  return `
    <div class="result-grid">
      ${results.map(r => `
        <div class="result-item">
          <p class="result-label">${r.label}</p>
          <p class="result-value">
            ${r.before ? `<span class="result-before">${r.before}</span>` : ''}${r.after}
          </p>
        </div>
      `).join('')}
    </div>
  `;
}

function renderProject(p, i) {
  const wrap = document.createElement('div');
  if (i > 0) wrap.innerHTML = '<hr class="divider">';

  let html = `
    <div class="project" id="${p.id}">
      <div class="project-header">
        <h2 class="project-title">${p.title}</h2>
        <span class="project-meta">${p.company} · ${p.year}</span>
      </div>
      <p class="project-subtitle">${p.subtitle}</p>
      <p class="block-label">Situation</p>
      <p class="block-text">${p.situation}</p>
      ${renderImages(p.situation_images)}
      <p class="block-label">Analysis & Action</p>
  `;

  if (p.steps && p.steps.length) {
    html += `<div class="steps">`;
    p.steps.forEach(s => {
      html += `
        <div class="step-item">
          <div><span class="step-badge">${s.step}</span></div>
          <div>
            <p class="step-title">${s.title}</p>
            <p class="step-content">${hl(s.content, s.codes)}</p>
            ${renderMermaid(s.mermaid)}
            ${renderImages(s.images)}
            ${s.result ? `<p class="step-result">→ ${s.result}</p>` : ''}
          </div>
        </div>
      `;
    });
    html += `</div>`;
  } else if (p.findings && p.findings.length) {
    p.findings.forEach(f => {
      html += `
        <div class="finding">
          <p class="finding-title">${f.title}</p>
          <p>${hl(f.content, f.codes)}</p>
          ${renderMermaid(f.mermaid)}
          ${renderImages(f.images)}
        </div>
      `;
    });
  }

  html += `
    <p class="block-label" style="margin-top:1.4rem;">Result</p>
    ${renderResults(p.results)}
    ${renderImages(p.result_images)}
    <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `;

  wrap.innerHTML += html;
  return wrap;
}

function renderToc(projects) {
  const tocEl = document.getElementById('toc-sidebar');
  tocEl.innerHTML = `
    <p class="sidebar-label">Projects</p>
    <nav class="toc">
      ${projects.map(p => `
        <a class="toc-item" href="#${p.id}" data-id="${p.id}">${p.title}</a>
      `).join('')}
    </nav>
  `;

  // Scroll spy
  const items = document.querySelectorAll('.toc-item');
  const projectEls = projects.map(p => document.getElementById(p.id)).filter(Boolean);

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        items.forEach(item => item.classList.remove('active'));
        const active = document.querySelector(`.toc-item[data-id="${entry.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-10% 0px -80% 0px' });

  projectEls.forEach(el => observer.observe(el));
}

function render(data) {
  const { meta, projects, experience, skills } = data;

  document.title = meta.name + ' — 포트폴리오';
  document.getElementById('nav-name').textContent = meta.github.replace('https://github.com/', '');
  document.getElementById('footer-text').textContent = meta.name + ' · ' + meta.email;

  // Hero
  document.getElementById('hero').innerHTML = `
    <p class="hero-label">${meta.role}</p>
    <h1>${meta.headline}<br><em>${meta.headline_em}</em></h1>
    <p class="hero-desc">${meta.description}</p>
    <div class="hero-links">
      <a href="mailto:${meta.email}">${meta.email}</a>
      <a href="${meta.github}" target="_blank">${meta.github.replace('https://', '')}</a>
    </div>
  `;

  // Projects
  const projectsEl = document.getElementById('projects-list');
  projects.forEach((p, i) => projectsEl.appendChild(renderProject(p, i)));

  // ToC (after projects are rendered)
  renderToc(projects);

  // Sidebar — Skills
  const skillsEl = document.getElementById('skills-sidebar');
  skillsEl.innerHTML = `<p class="sidebar-label">Skills</p>` +
    skills.map(s => `
      <div class="skill-group">
        <p class="skill-group-label">${s.group}</p>
        <div class="skill-pills">
          ${s.items.map(item => `<span class="skill-pill">${item}</span>`).join('')}
        </div>
      </div>
    `).join('');

  // Sidebar — Experience
  const expEl = document.getElementById('experience-sidebar');
  expEl.innerHTML = `<div class="sidebar-exp"><p class="sidebar-label">Experience</p>` +
    experience.map(e => `
      <div class="exp-item">
        <p class="exp-company">${e.company}</p>
        <p class="exp-role">${e.role}</p>
        <p class="exp-period">${e.period}</p>
      </div>
    `).join('') + `</div>`;
}
</script>
</body>
</html>
